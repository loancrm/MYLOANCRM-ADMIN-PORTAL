<div>
  <!-- Header -->
  <div class="p-1 m-2 fixed-card">
    <div class="d-flex justify-content-between">
      <div
        class="d-flex align-items-center justify-content-center pointer-cursor"
        (click)="goBack()"
      >
        <span class="me-2 d-flex align-items-center">
          <img src="../../../assets/images/icons/left-arrow.svg" alt="Back" />
        </span>
        <b><span class="back-btn-text">Users</span></b>
      </div>

      <button
        pButton
        pRipple
        type="button"
        class="p-button-primary"
        icon="pi pi-plus"
        (click)="goToCreate()"
      >
        &nbsp;Add User
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="m-2">
    <p-table
      #userTable
      [value]="accounts"
      [paginator]="true"
      [rows]="10"
      [lazy]="true"
       [totalRecords]="accountsCount"
      (onLazyLoad)="loadAccounts($event)"
      [rowsPerPageOptions]="[10, 25, 50]"
      [loading]="apiLoading"
      class="p-datatable-striped"
      responsiveLayout="scroll"
      scrollHeight="flex"
      dataKey="id"
      styleClass="p-datatable-customers "
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} Users"
      [showCurrentPageReport]="true"
      [globalFilterFields]="['name', 'phone', 'email']"
    >
      <!-- Search -->
      <ng-template pTemplate="caption">
        <div class="row">
          <div class="col-md-3 mt-2 no-padding-small">
            <div class="p-inputgroup">
              <input
              type="text"
              pInputText
              placeholder="Search by Name"
              [(ngModel)]="userNameToSearch"
              (ngModelChange)="
                  inputValueChangeEvent('loanId', userNameToSearch)
                "
              (keyup.enter)="filterWithName()"
            />
            <button
              type="button"
              pButton
              class="p-button-primary search-btn"
              [disabled]="!userNameToSearch"
              (click)="filterWithName()"
            >
              <img
                src="assets/images/icons/search.svg"
                alt="Search"
                width="16"
                height="16"
                style="vertical-align: middle"
              />
            </button>
            </div>
          </div>
        </div>
      </ng-template>

      <!-- Header -->
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th class="text-nowrap">Created Date</th>
          <th class="text-nowrap">Status</th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <!-- Body -->
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phone }}</td>
          <td>{{ user.role === '1' ? 'Admin' : 'Sales' }}</td>
          <td>{{ user.created_on | date }}</td>
          <td>
            <span
              class="status-badge"
              [ngClass]="{
                'status-active': user.status === 1,
                'status-inactive': user.status === 2
              }"
            >
              <span class="status-dot"></span>
              {{ user.status === 1 ? 'Active' : 'Inactive' }}
            </span>
          </td>
           <td>
            <div class="d-flex align-items-center">
              <img
                alt="Update User"
                src="../../../assets/images/icons/edit.svg"
                width="24px"
                height="24px"
                class="me-2 pointer-cursor"
                (click)="editUser(user.id)"
                pTooltip="Update User"
                tooltipPosition="top"
              />

              <!-- Status Badge -->
              <!-- <span
                class="badge me-2"
                [ngClass]="{
                  'bg-success': user.status == 1,
                  'bg-danger':  user.status == 2
                }"
              >
                {{ user.status == 1 ? 'Active' : 'Inactive' }}
              </span> -->

              <!-- Actions Menu -->
              <button
                [matMenuTriggerFor]="menu"
                style="all: unset; cursor: pointer"
                (click)="$event.stopPropagation()"
                pTooltip="Actions"
                tooltipPosition="top"
              >
                <img src="assets/images/icons/menu.svg" width="24" height="24" />
              </button>

              <mat-menu #menu="matMenu">
                <!-- If Active → show Mark Inactive -->
                <button
                  mat-menu-item
                  *ngIf="user.status == 1"
                  (click)="changeStatus(user, 2)"
                >
                  <span>Mark as Inactive</span>
                </button>

                <!-- If Inactive → show Mark Active -->
                <button
                  mat-menu-item
                  *ngIf="user.status == 2"
                  (click)="changeStatus(user, 1)"
                >
                  <span>Mark as Active</span>
                </button>
              </mat-menu>

            </div>
          </td>
        </tr>
      </ng-template>

      <!-- Empty -->
      <ng-template pTemplate="emptymessage">
        <tr class="text-center">
          <td colspan="10" class="text-center fw-bold">
            <p
              style="
                color: #535ab4;
                font-weight: 400;
                font-size: 18px;
              "
            >
              No Data Found
            </p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
