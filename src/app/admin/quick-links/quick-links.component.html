<div class="quick-links-wrapper">
  <!-- Header -->
  <div class="p-1 m-2 fixed-card">
    <div class="d-flex justify-content-between">
      <div
        class="d-flex align-items-center justify-content-center pointer-cursor"
        (click)="goBack()"
      >
        <span class="me-2 d-flex align-items-center">
          <img src="../../../assets/images/icons/left-arrow.svg" alt="Back" />
        </span>
        <b>
          <span class="back-btn-text">Quick Links </span>
        </b>
      </div>
    </div>
  </div>

  <div class="m-2">
    <div class="row g-3">

      <div class="col-md-6 col-lg-3" *ngFor="let link of links">
        <div class="link-card" [ngClass]="link.colorClass">

          <!-- Top: Icon + Open button -->
          <div class="card-top">
            <div class="card-icon">
              <i class="pi" [ngClass]="link.icon"></i>
            </div>
            <button class="open-btn" (click)="openLink(link)"
              pTooltip="Open in new tab" tooltipPosition="top">
              <i class="pi pi-external-link"></i>
            </button>
          </div>

          <!-- Title + Desc + Domain -->
          <div class="card-title">{{ link.title }}</div>
          <!-- <div class="card-desc">{{ link.desc }}</div> -->
          <div class="card-url">
            <i class="pi pi-globe me-1"></i>{{ link.domain }}
          </div>

          <!-- Divider -->
          <div class="card-divider"></div>

          <!-- Credentials -->
            <div class="credentials">

              <!-- Username — always show -->
              <div class="cred-row">
                <span class="cred-label">
                  <i class="pi pi-user me-1"></i>Username
                </span>
                <div class="cred-value-row">
                  <span class="cred-value">
                    {{ link.showUsername ? link.username : maskValue(link.username) }}
                  </span>
                  <div class="cred-actions">
                    <button class="icon-btn" (click)="toggleUsername(link)"
                      [pTooltip]="link.showUsername ? 'Hide' : 'Show'" tooltipPosition="top">
                      <i class="pi" [class.pi-eye]="!link.showUsername" [class.pi-eye-slash]="link.showUsername"></i>
                    </button>
                    <button class="icon-btn" (click)="copy(link.username, 'Username')"
                      pTooltip="Copy" tooltipPosition="top">
                      <i class="pi pi-copy"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Password — only show if not null -->
              <div class="cred-row" *ngIf="link.password">
                <span class="cred-label">
                  <i class="pi pi-lock me-1"></i>Password
                </span>
                <div class="cred-value-row">
                  <span class="cred-value">
                    {{ link.showPassword ? link.password : '••••••••' }}
                  </span>
                  <div class="cred-actions">
                    <button class="icon-btn" (click)="togglePassword(link)"
                      [pTooltip]="link.showPassword ? 'Hide' : 'Show'" tooltipPosition="top">
                      <i class="pi" [class.pi-eye]="!link.showPassword" [class.pi-eye-slash]="link.showPassword"></i>
                    </button>
                    <button class="icon-btn" (click)="copy(link.password, 'Password')"
                      pTooltip="Copy" tooltipPosition="top">
                      <i class="pi pi-copy"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Mobile — only show if not null -->
              <div class="cred-row" *ngIf="link.mobile">
                <span class="cred-label">
                  <i class="pi pi-phone me-1"></i>Mobile Number
                </span>
                <div class="cred-value-row">
                  <span class="cred-value">
                    {{ link.showMobile ? link.mobile : maskValue(link.mobile) }}
                  </span>
                  <div class="cred-actions">
                    <button class="icon-btn" (click)="link.showMobile = !link.showMobile"
                      [pTooltip]="link.showMobile ? 'Hide' : 'Show'" tooltipPosition="top">
                      <i class="pi" [class.pi-eye]="!link.showMobile" [class.pi-eye-slash]="link.showMobile"></i>
                    </button>
                    <button class="icon-btn" (click)="copy(link.mobile, 'Mobile Number')"
                      pTooltip="Copy" tooltipPosition="top">
                      <i class="pi pi-copy"></i>
                    </button>
                  </div>
                </div>
              </div>

            </div>
          <!-- Visit Button -->
          <button class="visit-btn" (click)="openLink(link)">
            <i class="pi pi-arrow-up-right me-2"></i>Visit {{ link.title }}
          </button>

        </div>
      </div>

    </div>
  </div>

  <!-- Copy Toast -->
  <div class="copy-toast" [class.show]="showCopyToast">
    <i class="pi pi-check-circle me-2"></i>{{ copyToastMsg }}
  </div>

</div>
